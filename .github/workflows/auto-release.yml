name: Auto Release
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: |
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      version: ${{ steps.bump.outputs.version }}
      released: ${{ steps.bump.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Determine next version
        id: bump
        run: |
          set -euo pipefail

          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_version=$PKG_VERSION"

          # Latest semver tag across all refs (not just ancestors of HEAD)
          LAST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          if [ -z "$LAST_TAG" ]; then
            echo "No tags yet; releasing package.json version $PKG_VERSION"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_VERSION="${LAST_TAG#v}"

          # Skip when HEAD has nothing new since the latest tag
          if [ -z "$(git rev-list -n 1 "${LAST_TAG}..HEAD" 2>/dev/null || true)" ]; then
            echo "No new commits since $LAST_TAG"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Base bump on max(package.json, last tag) so orphaned tags don't regress
          BASE="$PKG_VERSION"
          if [ "$(printf '%s\n%s\n' "$PKG_VERSION" "$LAST_VERSION" | sort -V | tail -1)" = "$LAST_VERSION" ]; then
            BASE="$LAST_VERSION"
          fi
          echo "base_version=$BASE"

          COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"%s" || true)
          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LAST_TAG"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$COMMITS" | grep -cE '^[a-z]+(\(.+\))?!:|^.*BREAKING CHANGE' || true)
          MINOR=$(echo "$COMMITS" | grep -cE '^(feat|feature)(\(.+\))?:' || true)

          IFS='.' read -r MAJOR_V MINOR_V PATCH_V <<< "$BASE"

          if [ "$MAJOR" -gt 0 ]; then
            MAJOR_V=$((MAJOR_V + 1))
            MINOR_V=0
            PATCH_V=0
          elif [ "$MINOR" -gt 0 ]; then
            MINOR_V=$((MINOR_V + 1))
            PATCH_V=0
          else
            PATCH_V=$((PATCH_V + 1))
          fi

          NEXT="${MAJOR_V}.${MINOR_V}.${PATCH_V}"

          if git rev-parse "v$NEXT" >/dev/null 2>&1; then
            echo "Tag v$NEXT already exists; refusing to re-release"
            exit 1
          fi

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Bump version in files
        if: steps.bump.outputs.released == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"

          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml

          node -e "
            const conf = require('./src-tauri/tauri.conf.json');
            conf.version = '$VERSION';
            require('fs').writeFileSync('./src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          echo "Version bumped to $VERSION"

      - name: Commit and tag
        if: steps.bump.outputs.released == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "chore: bump version to $VERSION"

          git tag "v$VERSION"
          # Push the bump commit onto main so package.json stays in sync, then the tag.
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v$VERSION"

      - name: Generate release notes
        if: steps.bump.outputs.released == 'true'
        id: notes
        run: |
          LAST_TAG="${{ steps.bump.outputs.last_tag }}"
          VERSION="${{ steps.bump.outputs.version }}"

          if [ -z "$LAST_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" 2>/dev/null || echo "- Initial release")
            FULL_LOG=""
          else
            NOTES=$(git log "$LAST_TAG..HEAD" --pretty=format:"- %s (%h)" 2>/dev/null || echo "- Initial release")
            FULL_LOG="**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...v$VERSION"
          fi

          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo ""
            echo "$FULL_LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.bump.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          token: ${{ secrets.GH_PAT || github.token }}
