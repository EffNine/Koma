name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      test-matrix: ${{ steps.list-tests.outputs.test-matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm typecheck
      - id: list-tests
        run: |
          # Exclude pwa.test.ts from matrix — it does a full vite build
          # which takes >15min on GitHub Actions runners
          TESTS=$(ls tests/*.test.ts | grep -v pwa | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
          echo "test-matrix=$TESTS" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        test-file: ${{ fromJson(needs.setup.outputs.test-matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Run ${{ matrix.test-file }}
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        # Use the exact path to tsx because `timeout` treats its first argument as the executable.
        run: timeout 90 ./node_modules/.bin/tsx "${{ matrix.test-file }}"

  pwa-test:
    needs: setup
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Run pwa test
        # Use exact path to tsx so `timeout` signals the test process directly.
        run: timeout 2700 ./node_modules/.bin/tsx "tests/pwa.test.ts"
