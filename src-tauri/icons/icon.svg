<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f0e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="#D97706" stroke-width="3" opacity="0.3"/>
  <!-- K letter -->
  <text x="256" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="340" font-weight="700" fill="#D97706" text-anchor="middle">K</text>
</svg>